<html>
<head>
<title>Tasks Workspace</title>
</head>
<body>
<h1>Tasks Workspace</h1>
<table border="1">
<tr>
<th>Portal</th>
<th>Store</th>
<th>Status</th>
<th>SLA</th>
<th>Last Seen</th>
</tr>
{% for t in tasks %}
<tr>
<td><a href="/ui/tasks/{{t.id}}">{{t.portal_task_id}}</a></td>
<td>{{t.store_no}}</td>
<td>{{t.status}}</td>
<td>{{t.sla_due_at}}</td>
<td>{{t.last_seen_at}}</td>
</tr>
{% endfor %}
</table>
</body>
</html>
