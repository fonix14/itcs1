<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page_title }}</title>
  <style>
    :root {
      --bg:#0f172a; --panel:#111827; --panel2:#1f2937; --text:#e5e7eb;
      --muted:#94a3b8; --border:#334155; --red:#ef4444; --green:#22c55e; --yellow:#eab308;
    }
    * { box-sizing:border-box; }
    body { margin:0; background:var(--bg); color:var(--text); font-family:Arial,sans-serif; }
    .wrap { max-width:760px; margin:0 auto; padding:16px; }
    h1 { margin:0 0 8px 0; font-size: 16px; }
    .sub { color:var(--muted); margin-bottom:16px; }
    .toolbar { display:flex; gap:10px; margin-bottom:16px; }
    input, button {
      background:var(--panel2); color:var(--text); border:1px solid var(--border);
      border-radius:12px; padding:12px 14px; font-size:16px;
    }
    input { flex:1; }
    button { min-width:120px; }
    .task {
      display:block; text-decoration:none; color:inherit; background:var(--panel);
      border:1px solid var(--border); border-radius:16px; padding:16px; margin-bottom:12px;
    }
    .top { display:flex; justify-content:space-between; gap:12px; margin-bottom:8px; }
    .id { font-size:18px; font-weight:700; }
    .store { color:var(--muted); font-size:14px; }
    .grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:10px; }
    .label { color:var(--muted); font-size:13px; margin-bottom:4px; }
    .v { font-size:15px; font-weight:600; }
    .sla-red { color:#fca5a5; }
    .sla-yellow { color:#fde68a; }
    .sla-green { color:#86efac; }
    @media (max-width: 560px) {
      .grid { grid-template-columns:1fr; }
      .toolbar { flex-direction:column; }
      button { width:100%; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Мои заявки</h1>
    <div class="sub">Mobile-first интерфейс для планшета</div>

    <div class="toolbar">
      <input id="q" placeholder="Поиск по Portal ID / Магазину">
      <button onclick="loadMobileTasks()">Обновить</button>
    </div>

    <div id="tasks_container">Загрузка...</div>
  </div>
  <script src="/static/mobile_tasks.js"></script>
</body>
</html>
