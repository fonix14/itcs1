<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page_title }}</title>
  <style>
    :root {
      --bg: #0f172a; --panel: #111827; --panel-2: #1f2937; --text: #e5e7eb;
      --muted: #94a3b8; --border: #334155;
    }
    * { box-sizing:border-box; }
    body { margin:0; font-family:Arial,sans-serif; background:var(--bg); color:var(--text); }
    .wrap { max-width:1280px; margin:0 auto; padding:20px; }
    .title { display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:20px; }
    .card { background:var(--panel); border:1px solid var(--border); border-radius:14px; padding:16px; }
    button, a.btn {
      padding:10px 14px; border:1px solid var(--border); border-radius:10px;
      background:var(--panel-2); color:var(--text); cursor:pointer; text-decoration:none; display:inline-block;
    }
    .toolbar { display:flex; gap:10px; margin-bottom:16px; align-items:center; }
    table { width:100%; border-collapse:collapse; }
    th, td { padding:12px; border-bottom:1px solid var(--border); text-align:left; font-size:14px; }
    th { color:var(--muted); }
    .muted { color:var(--muted); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="title">
      <div>
        <h1>ITCS Tasks</h1>
        <div class="muted">Список заявок и быстрый переход в карточку</div>
      </div>
      <a class="btn" href="/ui/dashboard">← Dashboard</a>
    </div>

    <div class="card">
      <div class="toolbar">
        <button onclick="loadTasks(false)">Все</button>
        <button onclick="loadTasks(true)">Только просроченные</button>
      </div>

      <div style="overflow-x:auto;">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Portal ID</th>
              <th>Магазин</th>
              <th>Менеджер</th>
              <th>Статус</th>
              <th>SLA</th>
              <th>Открыть</th>
            </tr>
          </thead>
          <tbody id="tasks_body">
            <tr><td colspan="7" class="muted">Загрузка...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
  <script src="/static/tasks_list.js"></script>
</body>
</html>
