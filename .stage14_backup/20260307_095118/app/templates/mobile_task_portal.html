<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>{{ page_title }}</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#0f172a">
  <style>
    :root{
      --bg:#0f172a; --panel:#111827; --panel2:#1f2937; --text:#e5e7eb;
      --muted:#94a3b8; --border:#334155; --blue:#60a5fa;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);font-family:Arial,sans-serif}
    .wrap{max-width:860px;margin:0 auto;padding:16px 16px 90px}
    .topbar{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:16px}
    h1{margin:0 0 6px 0;font-size:26px}
    .sub{color:var(--muted);font-size:14px}
    .profile{margin-top:8px;color:#cbd5e1;font-size:14px}
    .btn,button{
      background:var(--panel2);color:var(--text);border:1px solid var(--border);
      border-radius:14px;padding:13px 14px;font-size:16px;text-decoration:none;cursor:pointer
    }
    .card{background:var(--panel);border:1px solid var(--border);border-radius:18px;padding:16px;margin-bottom:12px}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .label{font-size:12px;color:var(--muted);margin-bottom:6px}
    .value{font-size:17px;font-weight:700;word-break:break-word}
    textarea{
      width:100%;min-height:120px;background:#0b1220;color:var(--text);border:1px solid var(--border);
      border-radius:14px;padding:12px;font-size:16px
    }
    .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
    input[type="file"]{
      width:100%;background:var(--panel2);color:var(--text);border:1px solid var(--border);
      border-radius:14px;padding:12px;font-size:16px
    }
    .att-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .att{border:1px solid var(--border);border-radius:14px;padding:10px;background:#0b1220}
    .att-title{font-size:13px;color:var(--muted);margin-bottom:8px}
    .att img{width:100%;height:180px;object-fit:cover;border-radius:10px;background:#000}
    .events{margin:0;padding-left:18px}
    .bottom-nav{
      position:fixed;left:0;right:0;bottom:0;background:rgba(15,23,42,.96);border-top:1px solid var(--border);
      display:grid;grid-template-columns:1fr 1fr;gap:0;padding-bottom:env(safe-area-inset-bottom)
    }
    .bottom-nav a{text-decoration:none;color:var(--text);text-align:center;padding:14px 8px;font-size:14px}
    @media (max-width:560px){
      .grid,.att-grid{grid-template-columns:1fr}
      h1{font-size:22px}
      .topbar{flex-direction:column;align-items:stretch}
      .btn{text-align:center}
    }
  </style>
</head>
<body>
  <div class="wrap" data-task-id="{{ task_id }}">
    <div class="topbar">
      <div>
        <h1>Заявка</h1>
        <div class="sub">Карточка менеджера с фото и комментариями</div>
        <div id="profile" class="profile">Пользователь не определён</div>
      </div>
      <a class="btn" href="/m/tasks">← К списку</a>
    </div>

    <div class="grid">
      <div class="card"><div class="label">Task ID</div><div class="value" id="task_id_value">{{ task_id }}</div></div>
      <div class="card"><div class="label">Portal Task ID</div><div class="value" id="portal_task_id">—</div></div>
      <div class="card"><div class="label">Статус</div><div class="value" id="status">—</div></div>
      <div class="card"><div class="label">Магазин</div><div class="value" id="store_no">—</div></div>
      <div class="card"><div class="label">Менеджер</div><div class="value" id="manager_name">—</div></div>
      <div class="card"><div class="label">SLA</div><div class="value" id="sla">—</div></div>
    </div>

    <div class="card">
      <div class="label">Быстрые действия</div>
      <div class="actions">
        <button onclick="acceptTask()">Принял</button>
        <button onclick="reloadTask()">Обновить</button>
      </div>
    </div>

    <div class="card">
      <div class="label">Комментарий</div>
      <textarea id="comment_text" placeholder="Введите комментарий по заявке"></textarea>
      <div class="actions">
        <button onclick="sendComment()">Сохранить комментарий</button>
      </div>
    </div>

    <div class="card">
      <div class="label">Фото с объекта</div>
      <input id="photo_input" type="file" accept="image/*" capture="environment">
      <div class="actions">
        <button onclick="uploadPhoto()">Загрузить фото</button>
      </div>
      <div id="attachments" class="att-grid" style="margin-top:12px;">Нет фото</div>
    </div>

    <div class="card">
      <div class="label">История событий</div>
      <ul id="events" class="events">
        <li>Загрузка...</li>
      </ul>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="/m/tasks">Заявки</a>
    <a href="/ui/dashboard">Dashboard</a>
  </nav>

  <script src="/static/mobile_task_portal.js"></script>
</body>
</html>
