<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>{{ page_title }}</title>
  <style>
    :root { color-scheme: dark; }
    body { margin:0; background:#081733; color:#e8edf7; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
    .wrap { max-width:900px; margin:0 auto; padding:24px 18px 40px; }
    .toplink { color:#9ec2ff; text-decoration:none; display:inline-block; margin-bottom:18px; }
    h1 { margin:0 0 12px; font-size:40px; }
    .error { display:none; margin:16px 0; padding:14px 16px; border-radius:18px; border:1px solid rgba(255,120,120,.35); background:rgba(120,20,20,.22); color:#ffd6d6; }
    .grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:14px; }
    .card, .actions, .comments, .payload-wrap { border:1px solid rgba(255,255,255,.12); background:rgba(255,255,255,.04); border-radius:24px; padding:18px; }
    .kv { display:grid; grid-template-columns:180px 1fr; gap:8px 14px; }
    .kv div:nth-child(odd) { color:#9fb0cc; }
    .actions { display:grid; gap:12px; }
    .actions-row { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:12px; }
    button { border:1px solid rgba(255,255,255,.14); background:rgba(255,255,255,.06); color:#fff; border-radius:18px; padding:16px 18px; font-size:18px; cursor:pointer; }
    textarea { width:100%; min-height:120px; box-sizing:border-box; resize:vertical; border:1px solid rgba(255,255,255,.12); background:rgba(255,255,255,.05); color:#fff; border-radius:18px; padding:14px 16px; font-size:16px; }
    pre { margin:0; white-space:pre-wrap; word-break:break-word; font-size:14px; color:#e8edf7; }
    .comment-card { border:1px solid rgba(255,255,255,.10); border-radius:18px; padding:14px; margin-top:12px; background:rgba(255,255,255,.03); }
    .comment-head { display:flex; justify-content:space-between; gap:12px; color:#cfdaf0; margin-bottom:8px; }
    .muted { color:#9fb0cc; }
    @media (max-width: 800px) { h1 { font-size:30px; } .grid, .actions-row, .kv { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <div class="wrap">
    <a class="toplink" href="/m/tasks">← Назад к списку</a>
    <h1>Карточка заявки</h1>
    <div id="task-error" class="error"></div>

    <div class="grid">
      <section class="card">
        <div class="kv">
          <div>Portal ID</div><div id="task-portal-id">—</div>
          <div>Магазин</div><div id="task-store-no">—</div>
          <div>Статус портала</div><div id="task-status">—</div>
          <div>Внутренний статус</div><div id="task-internal-status">—</div>
          <div>SLA</div><div id="task-sla">—</div>
          <div>Last seen</div><div id="task-last-seen">—</div>
          <div>Менеджер</div><div id="task-manager">—</div>
        </div>
      </section>

      <section class="actions">
        <div class="actions-row">
          <button id="btn-reload-task">Обновить</button>
          <button id="btn-accept-task">Принять</button>
          <button id="btn-close-task">Закрыть</button>
        </div>
        <textarea id="task-comment-input" placeholder="Комментарий менеджера"></textarea>
        <button id="btn-add-comment">Добавить комментарий</button>
      </section>
    </div>

    <section class="payload-wrap" style="margin-top:14px;">
      <h3>Payload</h3>
      <pre id="task-payload">{}</pre>
    </section>

    <section class="comments" style="margin-top:14px;">
      <h3>Комментарии</h3>
      <div id="task-comments"><div class="muted">Загрузка...</div></div>
    </section>
  </div>

  <script>window.__TASK_ID__ = "{{ task_id }}";</script>
  <script src="/static/mobile_task_portal.js"></script>
</body>
</html>
