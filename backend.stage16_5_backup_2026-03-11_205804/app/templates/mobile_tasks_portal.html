<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>{{ page_title }}</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#0f172a">
  <style>
    :root{--bg:#0f172a;--panel:#111827;--panel2:#1f2937;--text:#e5e7eb;--muted:#94a3b8;--border:#334155;--red:#ef4444;--green:#22c55e;--yellow:#eab308;--blue:#60a5fa}
    *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font-family:Arial,sans-serif}
    .wrap{max-width:860px;margin:0 auto;padding:16px 16px 90px}.top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:14px}
    h1{margin:0 0 6px 0;font-size:28px}.sub{color:var(--muted);font-size:14px;line-height:1.5}
    .toolbar{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
    .toolbar input,.toolbar select,.toolbar button{width:100%;background:var(--panel2);color:var(--text);border:1px solid var(--border);border-radius:14px;padding:13px 14px;font-size:16px}
    .chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}.chip{border:1px solid var(--border);background:var(--panel);color:var(--text);border-radius:999px;padding:10px 12px;font-size:14px;cursor:pointer}
    .chip.active{border-color:var(--blue);color:#dbeafe}.meta{color:var(--muted);font-size:14px;margin-bottom:12px}
    .task{display:block;text-decoration:none;color:inherit;background:var(--panel);border:1px solid var(--border);border-radius:18px;padding:14px;margin-bottom:12px}
    .task-top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.task-title{font-size:18px;font-weight:700;line-height:1.2}.task-store{color:var(--muted);font-size:14px;margin-top:4px}
    .status{border:1px solid var(--border);border-radius:999px;padding:7px 10px;font-size:13px;background:var(--panel2);white-space:nowrap}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
    .label{font-size:12px;color:var(--muted);margin-bottom:4px}.value{font-size:15px;font-weight:600}.sla-red{color:#fca5a5}.sla-yellow{color:#fde68a}.sla-green{color:#86efac}
    .empty,.error{background:var(--panel);border:1px solid var(--border);border-radius:18px;padding:18px;color:var(--muted)}
    .bottom-nav{position:fixed;left:0;right:0;bottom:0;background:rgba(15,23,42,.96);border-top:1px solid var(--border);display:grid;grid-template-columns:1fr 1fr;gap:0;padding-bottom:env(safe-area-inset-bottom)}
    .bottom-nav a{text-decoration:none;color:var(--text);text-align:center;padding:14px 8px;font-size:14px}.bottom-nav a.active{color:#93c5fd}
    @media (max-width:560px){.toolbar{grid-template-columns:1fr}.grid{grid-template-columns:1fr}h1{font-size:24px}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <h1>Мои заявки</h1>
        <div class="sub">Портал менеджера для планшета + workflow.<br>На iPhone push работает из PWA после «Добавить на экран Домой».</div>
      </div>
    </div>
    <div class="toolbar">
      <input id="q" placeholder="Поиск по Portal ID / Магазину">
      <select id="sort"><option value="sla">Сортировка: по SLA</option><option value="new">Сортировка: новые сверху</option></select>
      <button onclick="loadTasks()">Обновить</button>
      <button onclick="installPwa()">Установить на экран</button>
      <input id="manager_uuid" placeholder="Manager UUID" onchange="setActorId()">
      <button onclick="setActorId()">Сохранить UUID</button>
    </div>
    <div class="chips">
      <button class="chip active" onclick="setFilter('all', this)">Все</button>
      <button class="chip" onclick="setFilter('accepted', this)">Принятые</button>
      <button class="chip" onclick="setFilter('open', this)">Открытые</button>
      <button class="chip" onclick="setFilter('overdue', this)">Просроченные</button>
    </div>
    <div class="meta" id="meta">Загрузка...</div>
    <div id="tasks_container">Загрузка...</div>
  </div>
  <nav class="bottom-nav"><a href="/m/tasks" class="active">Заявки</a><a href="/ui/dashboard">Dashboard</a></nav>
  <script src="/static/mobile_tasks_portal.js"></script>
</body>
</html>
